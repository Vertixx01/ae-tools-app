name: Build release bundle

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.4

      - name: Setup Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Linux dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev pkg-config libgtk-3-dev

      - name: Install dependencies
        run: bun install

      - name: Run checks
        run: bun run check

      - name: Build bundled app
        run: bun run tauri build

      - name: Package artifacts
        run: |
          mkdir -p release-artifacts
          cd src-tauri/target/release/bundle
          zip -r "$GITHUB_WORKSPACE/release-artifacts/ae-tools-app-${GITHUB_RUN_NUMBER}.zip" *
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v1
        with:
          files: release-artifacts/ae-tools-app-${{ github.run_number }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
